<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorManía</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>

        <div class="barra-superior">

            <div class="logo">
                <span class="blanco">Flor</span><span class="negro">Manía</span>
            </div>

            <nav class="menu-principal">
                <a href="#">Inicio</a>
                <a href="#">Productos</a>
                <a href="#" id="enviar-flores">Enviar flores</a>
                <a href="#">Nosotros</a>

                <button id="boton-sesion">
                    Iniciar Sesión
                </button>
            </nav>

        </div>

        <nav class="categorias">
            <a href="#">Girasoles</a>
            <a href="#">Rosas</a>
            <a href="#">Claveles</a>
            <a href="#">Tulipanes</a>
            <a href="#">Lirios</a>
            <a href="#">Orquídeas</a>
            <a href="#">Margaritas</a>
        </nav>

    </header>

    <main>

        <section class="flor-mes">

            <h1>Flor del Mes</h1>

            <div class="flor-principal">
                <img src="https://www.nurserymag.com/fileuploads/image/2023/02/10/rose-stock-web.gif" alt="Flor del Mes">
            </div>

        </section>

        <section class="encabezado-productos">

            <p><strong>Mostrando 50 resultados</strong></p>

            <a href="#">Ver más Flores</a>

        </section>

        <section class="productos">

            <article class="tarjeta">

                <div class="flor-producto">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe_juE1kowB9Fq4VU0_zUI_gAELIqE16jAmy83PPMTvhNJYp9XX1UjekAB&s=10" alt="Ramo de Rosas">
                </div>

                <h3>Ramo de Rosas</h3>

                <p class="precio">$40.00</p>

                <button class="boton-comprar">
                    Comprar
                </button>

            </article>

            <article class="tarjeta">

                <div class="flor-producto">
                    <img src="https://www.jardineromadrid.es/wp-content/uploads/2024/04/como-cuidar-tulipanes.jpg" alt="Arreglo Tulipanes">
                </div>

                <h3>Arreglo Tulipanes</h3>

                <p class="precio">$50.00</p>

                <button class="boton-comprar">
                    Comprar
                </button>

            </article>

            <article class="tarjeta">

                <div class="flor-producto">
                    <img src="https://www.bourguignonfloristas.es/media/wysiwyg/lirio-blanco-rosa.jpg" alt="Bouquet Lirios">
                </div>

                <h3>Bouquet Lirios</h3>

                <p class="precio">$25.00</p>

                <button class="boton-comprar">
                    Comprar
                </button>

            </article>

        </section>

    </main>

    <footer>

        <p>FlorManía © 2026</p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
