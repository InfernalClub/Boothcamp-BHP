<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorManía</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>

        <div class="barra-superior">

            <div class="logo">
                <span class="blanco">Flor</span><span class="negro">Manía</span>
            </div>

            <nav class="menu-principal">
                <a href="#">Inicio</a>
                <a href="#">Productos</a>
                <a href="#" id="enviar-flores">Enviar flores</a>
                <a href="#">Nosotros</a>

                <button id="boton-sesion">
                    Iniciar Sesión
                </button>
            </nav>

        </div>

        <nav class="categorias">
            <a href="#">Girasoles</a>
            <a href="#">Rosas</a>
            <a href="#">Claveles</a>
            <a href="#">Tulipanes</a>
            <a href="#">Lirios</a>
            <a href="#">Orquídeas</a>
            <a href="#">Margaritas</a>
        </nav>

    </header>

    <main>

        <section class="flor-mes">

            <h1>Flor del Mes</h1>

            <div class="flor-principal">
                <img src="img/flor-del-mes.jpg" alt="Flor del Mes">
            </div>

        </section>

        <section class="encabezado-productos">

            <p><strong>Mostrando 50 resultados</strong></p>

            <a href="#">Ver más Flores</a>

        </section>

        <section class="productos">

            <article class="tarjeta">

                <div class="flor-producto">
                    <img src="img/ramo-de-rosas.jpg" alt="Ramo de Rosas">
                </div>

                <h3>Ramo de Rosas</h3>

                <div class="pie-tarjeta">

                    <p class="precio">$40.00</p>

                    <button class="boton-comprar">
                        Comprar
                    </button>

                </div>

            </article>

            <article class="tarjeta">

                <div class="flor-producto">
                    <img src="img/arreglo-tulipanes.jpg" alt="Arreglo Tulipanes">
                </div>

                <h3>Arreglo Tulipanes</h3>

                <div class="pie-tarjeta">

                    <p class="precio">$50.00</p>

                    <button class="boton-comprar">
                        Comprar
                    </button>

                </div>

            </article>

            <article class="tarjeta">

                <div class="flor-producto">
                    <img src="img/bouquet-lirios.jpg" alt="Bouquet Lirios">
                </div>

                <h3>Bouquet Lirios</h3>

                <div class="pie-tarjeta">

                    <p class="precio">$25.00</p>

                    <button class="boton-comprar">
                        Comprar
                    </button>

                </div>

            </article>

        </section>

    </main>

    <footer>

        <p>FlorManía © 2026</p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
